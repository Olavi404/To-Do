<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shared To-Do</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="app-shell">
      <header class="app-header">
        <p class="eyebrow">No login. One shared board.</p>
        <h1>Team To-Do</h1>
        <p class="sub">Anyone with this link can add and update tasks in real time on refresh.</p>
      </header>

      <section class="panel">
        <form id="todo-form" class="todo-form">
          <input id="todo-input" type="text" maxlength="140" placeholder="What needs to be done?" required />
          <button type="submit">Add</button>
        </form>

        <div class="toolbar">
          <span id="counter">0 tasks</span>
          <div class="toolbar-actions">
            <button id="clear-completed-btn" class="ghost" type="button">Clear completed</button>
            <button id="refresh-btn" class="ghost" type="button">Refresh</button>
          </div>
        </div>

        <div class="filters" role="group" aria-label="Filter tasks">
          <button class="filter-btn is-active" type="button" data-filter="all">All</button>
          <button class="filter-btn" type="button" data-filter="active">Active</button>
          <button class="filter-btn" type="button" data-filter="done">Done</button>
        </div>

        <ul id="todo-list" class="todo-list" aria-live="polite"></ul>
        <p id="status" class="status"></p>
      </section>
    </main>

    <template id="todo-item-template">
      <li class="todo-item">
        <label class="check-wrap">
          <input type="checkbox" class="toggle" />
          <span class="check-ui"></span>
        </label>
        <input type="text" class="todo-text" maxlength="140" />
        <button class="delete-btn" type="button" aria-label="Delete task">Delete</button>
      </li>
    </template>

    <script type="module" src="app.js"></script>
  </body>
</html>
